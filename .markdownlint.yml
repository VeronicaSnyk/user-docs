# markdownlint configuration for Snyk user-docs
# Docs: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# MD001 — heading levels increment by one
MD001: true

# MD003 — heading style: ATX (#) only
MD003:
  style: atx

# MD004 — unordered list style: dash only
MD004:
  style: dash

# MD007 — unordered list indentation: 2 spaces
MD007:
  indent: 2

# MD009 — no trailing spaces (allow 2 for line break)
MD009:
  br_spaces: 2

# MD010 — no hard tabs
MD010: true

# MD012 — no multiple consecutive blank lines
MD012:
  maximum: 1

# MD013 — line length: disabled (GitBook content often has long lines)
MD013: false

# MD022 — headings surrounded by blank lines
MD022: true

# MD023 — headings must start at beginning of line
MD023: true

# MD024 — no duplicate headings within a section (siblings OK)
MD024:
  siblings_only: true

# MD025 — single H1 per file
MD025: true

# MD026 — no trailing punctuation in headings (allow ? and !)
MD026:
  punctuation: '.,;:。，；：'

# MD029 — ordered list item prefix: ordered (1. 2. 3.)
MD029:
  style: ordered

# MD030 — spaces after list markers
MD030:
  ul_single: 1
  ol_single: 1
  ul_multi: 1
  ol_multi: 1

# MD031 — fenced code blocks surrounded by blank lines
MD031: true

# MD032 — lists surrounded by blank lines
MD032: true

# MD033 — no inline HTML (GitBook uses some hint/tab syntax — disable)
MD033: false

# MD034 — no bare URLs (use proper link syntax)
MD034: true

# MD036 — no emphasis used as heading
MD036: true

# MD037 — no spaces inside emphasis markers
MD037: true

# MD038 — no spaces inside code span
MD038: true

# MD039 — no spaces inside link text
MD039: true

# MD040 — fenced code blocks must have language
MD040: true

# MD041 — first line must be a top-level heading
MD041: true

# MD042 — no empty links
MD042: true

# MD044 — proper names casing (key Snyk terms)
MD044:
  names:
    - Snyk
    - GitHub
    - GitLab
    - Node.js
    - .NET
    - npm
    - DevOps
    - DevSecOps
    - AppSec
    - CI/CD
    - AI-BOM
  code_blocks: false

# MD045 — images must have alt text
MD045: true

# MD046 — code block style: fenced
MD046:
  style: fenced

# MD047 — files end with single newline
MD047: true

# MD048 — code fence style: backtick
MD048:
  style: backtick

# MD049 — emphasis style: asterisk
MD049:
  style: asterisk

# MD050 — strong style: asterisk
MD050:
  style: asterisk
