StylesPath = .vale/styles
MinAlertLevel = suggestion

[*.md]
BasedOnStyles = Snyk

# Rule levels
# error       = blocks merge (critical: AI buzzwords)
# warning     = flags for human review (style, voice, tense, brand)
# suggestion  = informational (minor preferences)

Snyk.AIBuzzwords = error
Snyk.SnykCapitalization = warning
Snyk.PassiveVoice = warning
Snyk.FutureTense = warning
Snyk.ModalVerbs = warning
Snyk.Substitutions = warning
Snyk.HeadingStyle = suggestion
Snyk.Terms = warning
